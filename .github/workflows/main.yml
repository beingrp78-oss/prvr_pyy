name: PRAVEER.OWNS GHOST-V133
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  flood:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        machine: [1, 2] # 2 Machines x 4 Agents = 8 Agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install selenium webdriver-manager
      - env:
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          MESSAGES: ${{ secrets.MESSAGES }}
          MACHINE_ID: ${{ matrix.machine }}
        run: python -u praveer_v133.py
