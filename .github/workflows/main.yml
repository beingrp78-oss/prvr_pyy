name: PRAVEER.OWNS INSTANT-V143
on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to start it manually anytime

jobs:
  flood:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Splits the work: Machine 1 (Agents 1-4) and Machine 2 (Agents 5-8)
        machine: [1, 2] 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install selenium webdriver-manager

      - name: Run V143 Script
        env:
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          MESSAGES: ${{ secrets.MESSAGES }}
          MACHINE_ID: ${{ matrix.machine }}
        # Your python file must be named exactly as below in your repo
        run: python -u praveer_v143.py
